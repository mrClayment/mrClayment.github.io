<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blog Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #222;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .post {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .post h2 {
      margin-top: 0;
    }

    .post p {
      color: #555;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #222;
      color: white;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>My Blog</h1>
  <p>Welcome to my simple blog website</p>
</header>

<div class="container">

  <div class="post">
    <h2>My First Blog</h2>
    <p>This is a simple blog post using HTML and CSS.</p>
  </div>

  <div class="post">
    <h2>Learning Web Development</h2>
    <p>I am currently learning how to build websites using HTML, CSS, and JavaScript.</p>
  </div>

</div>

<footer>
  <p>© 2026 My Blog</p>
</footer>

</body>
</html>
