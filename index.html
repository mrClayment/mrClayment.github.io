<!DOCTYPE html>
<html>
<head>
  <title>My Portfolio</title>
  <style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f0f2f5;
    color: #333;
  }

  header {
    background: linear-gradient(135deg, rgb(49, 49, 49););
    color: white;
    text-align: center;
    padding: 50px 20px;
  }

  header h1 {
    margin: 0;
    font-size: 36px;
  }

  header p {
    margin-top: 10px;
    font-size: 18px;
  }

  section {
    max-width: 900px;
    margin: 30px auto;
    padding: 20px;
  }

  h2 {
    border-bottom: 2px solid #ddd;
    padding-bottom: 10px;
  }

  .project {
    background: white;
    padding: 15px;
    margin: 15px 0;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  a {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 12px;
    background: #4facfe;
    color: white;
    text-decoration: none;
    border-radius: 5px;
  }

  a:hover {
    background: #00c6ff;
  }
</style>
</head>

<body>

  <header>
    <h1>Hi, I'm Juanittto 👋</h1>
    <p>Aspiring Web Developer</p>
  </header>

  <section>
    <h2>About Me</h2>
    <p>I am an IT graduate and I love building websites.</p>
  </section>

  <section>
    <h2>Skills</h2>
    <ul>
      <li>HTML</li>
      <li>CSS</li>
      <li>JavaScript</li>
    </ul>
  </section>

  <section>
    <h2>Projects</h2>

    <div class="project">
      <h3>To-Do App</h3>
      <p>A simple task manager using JavaScript.</p>
    </div>

    <div class="project">
      <h3>Blog Website</h3>
      <p>A basic blog layout using HTML & CSS.</p>
    </div>

  </section>

  <section>
    <h2>Contact</h2>
    <p>Email: your@email.com</p>
  </section>

</body>
</html>
